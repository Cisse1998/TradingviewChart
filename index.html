<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

/* =========================
   ✅ FIXED DERIV CONNECTION
========================= */
const DERIV_WS_URL = "wss://ws.derivws.com/websockets/v3?app_id=1089";

function useDerivStream(symbol, onTick, onHistory) {
  const wsRef = useRef(null);
  const subscriptionIdRef = useRef(null);
  const reconnectRef = useRef(null);

  useEffect(() => {
    if (!symbol) return;

    let ws;
    let pingInterval;

    const connect = () => {
      ws = new WebSocket(DERIV_WS_URL);
      wsRef.current = ws;

      ws.onopen = () => {
        console.log("✅ Connected to Deriv:", symbol);

        // 🔁 Keep alive
        pingInterval = setInterval(() => {
          ws.send(JSON.stringify({ ping: 1 }));
        }, 30000);

        // 📊 Get history first
        ws.send(JSON.stringify({
          ticks_history: symbol,
          adjust_start_time: 1,
          end: "latest",
          count: 1000,
          style: "ticks"
        }));
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          // DEBUG (optional)
          // console.log("RAW:", data);

          // ✅ Save subscription id
          if (data.subscription?.id) {
            subscriptionIdRef.current = data.subscription.id;
          }

          // 📊 HISTORY
          if (data.msg_type === "history") {
            const prices = data.history?.prices || [];
            const times = data.history?.times || [];

            const ticks = prices.map((p, i) => ({
              price: parseFloat(p),
              timestamp: times[i] * 1000
            }));

            onHistory(ticks);

            // 🔴 Subscribe to live ticks AFTER history
            ws.send(JSON.stringify({
              ticks: symbol,
              subscribe: 1
            }));
          }

          // 🔴 LIVE TICKS
          if (data.msg_type === "tick") {
            onTick(data.tick.quote, data.tick.epoch * 1000);
          }

          if (data.error) {
            console.error("❌ Deriv error:", data.error);
          }

        } catch (err) {
          console.error("Parse error:", err);
        }
      };

      ws.onerror = (err) => {
        console.error("WebSocket error:", err);
      };

      ws.onclose = (event) => {
        console.warn("⚠️ Disconnected:", event.code, event.reason);

        clearInterval(pingInterval);

        // 🔁 Auto reconnect
        reconnectRef.current = setTimeout(() => {
          console.log("🔄 Reconnecting...");
          connect();
        }, 2000);
      };
    };

    connect();

    return () => {
      clearInterval(pingInterval);
      clearTimeout(reconnectRef.current);

      if (wsRef.current) {
        if (subscriptionIdRef.current) {
          wsRef.current.send(JSON.stringify({
            forget: subscriptionIdRef.current
          }));
        }
        wsRef.current.close();
      }
    };
  }, [symbol]);
}
</script>
