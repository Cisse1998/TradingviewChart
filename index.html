    // ---------- helper: extract last digit from a formatted price string ----------
    function getLastDigitFromPrice(priceStr) {
      const dotIndex = priceStr.indexOf('.');
      if (dotIndex === -1) {
        return parseInt(priceStr.slice(-1), 10);
      } else {
        const decimalPart = priceStr.slice(dotIndex + 1);
        return parseInt(decimalPart.slice(-1), 10);
      }
    }

    // ---------- WebSocket manager that fetches history and then subscribes (public, no auth) ----------
    function useDerivStream(symbol, onTick, onHistory) {
      const wsRef = useRef(null);
      const subscriptionIdRef = useRef(null);

      useEffect(() => {
        if (!symbol) return;

        // Close any existing connection
        if (wsRef.current) {
          wsRef.current.close();
          wsRef.current = null;
        }

        const ws = new WebSocket(DERIV_WS_URL);
        wsRef.current = ws;

        ws.onopen = () => {
          // Request tick history (last 1000 ticks)
          ws.send(JSON.stringify({
            ticks_history: symbol,
            adjust_start_time: 1,
            end: "latest",
            start: 1,
            style: "ticks",
            count: 1000
          }));
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);

            // Handle history response
            if (data.msg_type === 'history') {
              if (data.history && data.history.prices && data.history.times) {
                const prices = data.history.prices;
                const times = data.history.times;
                const ticks = prices.map((price, idx) => ({
                  price: parseFloat(price),
                  timestamp: times[idx] * 1000 // seconds to ms
                }));
                onHistory(ticks);
              }
              // After history, subscribe to live ticks
              ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
            }

            // Handle live tick
            if (data.msg_type === 'tick' && data.tick) {
              subscriptionIdRef.current = data.tick.id;
              const rawPrice = data.tick.quote;
              onTick(rawPrice, data.tick.epoch * 1000);
            }

            // Handle errors
            if (data.error) {
              console.error("Deriv API error:", data.error);
            }
          } catch (e) {
            console.error("Error parsing message", e);
          }
        };

        ws.onerror = (err) => {
          console.error("WebSocket error", err);
        };

        ws.onclose = (event) => {
          console.log("WebSocket closed", event.code, event.reason);
        };

        return () => {
          if (wsRef.current) {
            if (subscriptionIdRef.current) {
              wsRef.current.send(JSON.stringify({ forget: subscriptionIdRef.current }));
            }
            wsRef.current.close();
            wsRef.current = null;
          }
        };
      }, [symbol, onTick, onHistory]);
    }

    // ---------- analysis functions (unchanged) ----------
    function computeDigitFrequency(digits) {
      const total = digits.length;
      const counts = Array(10).fill(0);
      digits.forEach(d => counts[d]++);
      return counts.map((count, digit) => ({ digit, count, percentage: total > 0 ? (count / total) * 100 : 0 }));
    }

    function computeFrequency(digits) {
      const total = digits.length;
      if (total === 0) return [];
      const counts = Array(10).fill(0);
      digits.forEach(d => counts[d]++);
      return counts.map((count, digit) => ({ digit, count, percentage: (count / total) * 100 }));
    }

    function keepLastN(digits, n) {
      if (digits.length <= n) return digits;
      return digits.slice(digits.length - n);
    }

    function computeOverUnder(digits) {
      const total = digits.length;
      return Array.from({ length: 10 }, (_, target) => {
        const overCount = digits.filter(d => d > target).length;
        const underCount = digits.filter(d => d < target).length;
        return { digit: target, overCount, overPercentage: total > 0 ? (overCount / total) * 100 : 0, underCount, underPercentage: total > 0 ? (underCount / total) * 100 : 0 };
      });
    }
    function computeMatchDiffer(digits) {
      const total = digits.length;
      return Array.from({ length: 10 }, (_, target) => {
        const matchCount = digits.filter(d => d === target).length;
        return { digit: target, matchCount, matchPercentage: total > 0 ? (matchCount / total) * 100 : 0, differCount: total - matchCount, differPercentage: total > 0 ? ((total - matchCount) / total) * 100 : 0 };
      });
    }
    function computeEvenOdd(digits) {
      const total = digits.length;
      const evenCount = digits.filter(d => d % 2 === 0).length;
      return { evenCount, evenPercentage: total > 0 ? (evenCount / total) * 100 : 0, oddCount: total - evenCount, oddPercentage: total > 0 ? ((total - evenCount) / total) * 100 : 0 };
    }

    function computeRiseFall(prices) {
      if (prices.length < 2) return { riseCount: 0, fallCount: 0, sameCount: 0, totalMovements: 0, risePercent: 0, fallPercent: 0 };
      let rise = 0, fall = 0, same = 0;
      for (let i = 1; i < prices.length; i++) {
        const prev = prices[i-1];
        const curr = prices[i];
        if (curr > prev) rise++;
        else if (curr < prev) fall++;
        else same++;
      }
      const total = rise + fall + same;
      return {
        riseCount: rise,
        fallCount: fall,
        sameCount: same,
        totalMovements: total,
        risePercent: total > 0 ? (rise / total) * 100 : 0,
        fallPercent: total > 0 ? (fall / total) * 100 : 0,
        samePercent: total > 0 ? (same / total) * 100 : 0
      };
    }

    // ---------- components (all as before, but table tags fixed) ----------

    function DigitCircle({ digit, percentage, rank, isCurrent }) {
      let bgClass = "";
      let textClass = "";
      let borderClass = "";
      if (rank === 1) {

        textClass = "text-green-400";
        borderClass = "border-green-500";
      } else if (rank === 2) {
        bgClass = "bg-blue-500/20";
        textClass = "text-blue-400";
        borderClass = "border-blue-500";
      } else if (rank === -1) {
        bgClass = "bg-red-500/20";
        textClass = "text-red-400";
        borderClass = "border-red-500";
      } else if (rank === -2) {
        bgClass = "bg-yellow-500/20";
        textClass = "text-yellow-400";
        borderClass = "border-yellow-500";
      } else {
        bgClass = digit % 2 === 0 ? "bg-profit/15" : "bg-loss/15";
        textClass = digit % 2 === 0 ? "text-profit" : "text-loss";
        borderClass = "border-border";
      }

      return (
        <div className="flex flex-col items-center mx-1">
          <div className={`relative w-16 h-16 rounded-full border-4 ${borderClass} ${bgClass}`}>

    function RiseFallCard({ data }) {

    function SuggestionCard({ frequency }) {
      if (!frequency || frequency.length === 0) return null;
      const deviations = frequency.map(f => ({ digit: f.digit, dev: f.percentage - 10 }));
      const sorted = [...deviations].sort((a, b) => Math.abs(b.dev) - Math.abs(a.dev));
      const topOver = sorted.filter(d => d.dev > 0).slice(0, 3);
      const topUnder = sorted.filter(d => d.dev < 0).slice(0, 3);

      return (
        <AnalysisCard title="📈 Trading Suggestions" subtitle="Digits deviating most from 10% (last 1000 ticks)">
          <div className="flex flex-wrap gap-6">
            <div className="flex-1 min-w-[200px]">
              <h4 className="text-xs uppercase tracking-wider text-profit mb-2">🔴 Overrepresented (may sell)</h4>
              {topOver.length === 0 ? <p className="text-muted-foreground text-sm">None</p> : 
                topOver.map(d => <div key={d.digit} className="flex justify-between items-center text-sm py-1 border-b border-border/50"><span className="font-mono">Digit {d.digit}</span><span className="text-profit font-mono">+{d.dev.toFixed(1)}%</span></div>)}
            </div>
            <div className="flex-1 min-w-[200px]">
              <h4 className="text-xs uppercase tracking-wider text-loss mb-2">🟢 Underrepresented (may buy)</h4>
              {topUnder.length === 0 ? <p className="text-muted-foreground text-sm">None</p> : 
                topUnder.map(d => <div key={d.digit} className="flex justify-between items-center text-sm py-1 border-b border-border/50"><span className="font-mono">Digit {d.digit}</span><span className="text-loss font-mono">{d.dev.toFixed(1)}%</span></div>)}
            </div>
          </div>
        </AnalysisCard>
      );
    }

    function SignalScanner({ digits1000, lastDigit }) {
      const [scannerActive, setScannerActive] = useState(false);
      const [lastSignal, setLastSignal] = useState(null);

      const prediction = useMemo(() => {
        const len = digits1000.length;
        if (len === 0) return null;
        const counts = Array(10).fill(0);
        digits1000.forEach(d => counts[d]++);
        const percentages = counts.map(c => (c / digits1000.length) * 100);
        let maxIdx = 0;
        for (let i = 1; i < 10; i++) {
          if (percentages[i] > percentages[maxIdx]) maxIdx = i;
        }
        const highestPct = percentages[maxIdx];
        const triggerDigit = maxIdx;

        const target1 = highestPct - 0.5;
        let closest1 = 0;
        let minDiff1 = Math.abs(percentages[0] - target1);
        for (let i = 1; i < 10; i++) {
          const diff = Math.abs(percentages[i] - target1);
          if (diff < minDiff1) {
            minDiff1 = diff;
            closest1 = i;
          }
        }
        const firstTargetPct = percentages[closest1];

        const target2 = firstTargetPct - 0.5;
        let closest2 = 0;
        let minDiff2 = Math.abs(percentages[0] - target2);
        for (let i = 1; i < 10; i++) {
          const diff = Math.abs(percentages[i] - target2);
          if (diff < minDiff2) {
            minDiff2 = diff;
            closest2 = i;
          }
        }
        const targetDigit = closest2;

        return { triggerDigit, targetDigit, highestPct, target1, firstTargetPct, target2, targetPct: target2 };
      }, [digits1000]);

      useEffect(() => {
        if (scannerActive && prediction && lastDigit === prediction.triggerDigit) {
          setLastSignal({ ...prediction, timestamp: Date.now() });
        }
      }, [lastDigit, prediction, scannerActive]);

      const toggleScanner = () => {
        setScannerActive(prev => !prev);
        setLastSignal(null);
      };

      return (
        <AnalysisCard title="🔔 Signal Scanner " subtitle="Exact digit prediction is shown below">
          <div className="flex items-center justify-between mb-3">
            <button
              onClick={toggleScanner}
              className={`px-4 py-1.5 rounded text-sm font-semibold transition-colors ${
                scannerActive 
                  ? 'bg-destructive text-destructive-foreground hover:bg-destructive/80' 
                  : 'bg-primary text-primary-foreground hover:bg-primary/80'
              }`}
            >
              {scannerActive ? '⏹ Stop Scanner' : '▶ Start Scanner'}
            </button>
            {scannerActive && <span className="text-xs text-profit animate-pulse">● SCANNING</span>}
          </div>

          {prediction ? (
            <div>
              <p className="text-sm">
                <span className="text-muted-foreground">Highest digit:</span>{' '}
                <span className="font-bold text-highlight text-lg">{prediction.triggerDigit}</span>{' '}
                <span className="text-muted-foreground">({prediction.highestPct.toFixed(1)}%)</span>
              </p>
              <p className="text-sm mt-1">
                <span className="text-muted-foreground">Exact scanned is:</span>{' '}
                <span className="font-bold text-profit text-lg">{prediction.targetDigit}</span>{' '}
                <span className="text-muted-foreground">(probability {prediction.targetPct.toFixed(1)}%)</span>
              </p>
              {lastSignal && scannerActive && (
                <div className="mt-3 p-3 bg-profit/20 border border-profit rounded-md animate-pulse">
                  <span className="font-mono text-sm">⚡ SIGNAL — Entry Digit {prediction.triggerDigit} Prediction is {prediction.targetDigit}</span>
                </div>
              )}
            </div>
          ) : (
            <p className="text-muted-foreground">Waiting for enough data...</p>
          )}
        </AnalysisCard>
      );
    }

    function RecentMovements({ prices }) {
      const getMovement = (index) => {
        if (index === 0 || prices.length < 2) return '—';
        const prev = prices[index-1];
        const curr = prices[index];
        if (curr > prev) return 'R';
        if (curr < prev) return 'F';
        return '=';
      };

      const last50 = prices.slice(-50).reverse();
      const last50Indices = prices.slice(-50).map((_, idx) => prices.length - 50 + idx).reverse();

      return (
        <AnalysisCard title="📈 Tick Movements (last 50)" subtitle="R=Rise, F=Fall, = =Same, — =First tick">
          <div className="flex flex-wrap gap-1.5">
            {last50.map((price, i) => {
              const originalIndex = last50Indices[i];
              const movement = getMovement(originalIndex);
              return (
                <div key={i} className={`w-8 h-8 flex items-center justify-center rounded text-xs font-mono font-bold ${
                  movement === 'R' ? 'bg-profit/15 text-profit' : 
                  movement === 'F' ? 'bg-loss/15 text-loss' : 
                  'bg-secondary text-muted-foreground'
                }`}>
                  {movement}
                </div>
              );
            })}
          </div>
        </AnalysisCard>
      );
    }

    function EvenOddSignalScanner({ digits1000, threshold, setThreshold, minCount, setMinCount }) {
      const [operator, setOperator] = useState('≥');

      const counts = Array(10).fill(0);
      digits1000.forEach(d => counts[d]++);
      const percentages = counts.map(c => (c / digits1000.length) * 100);

      const digitEntries = percentages.map((p, digit) => ({ digit, percentage: p }));
      const sorted = [...digitEntries].sort((a, b) => b.percentage - a.percentage);
      const topTwo = sorted.slice(0, 2);
      const bottomTwo = sorted.slice(-2).reverse();

      const greenBlueEven = topTwo[0].digit % 2 === 0 && topTwo[1].digit % 2 === 0;
      const greenBluePctOK = topTwo[0].percentage >= 11 && topTwo[1].percentage >= 11;
      const redYellowOdd = bottomTwo[0].digit % 2 === 1 && bottomTwo[1].digit % 2 === 1;
      const redPctOK = bottomTwo[0].percentage <= 8.6;

    function TradePredictions({ frequency1000, overUnder, evenOdd, riseFall }) {
      if (!frequency1000 || frequency1000.length === 0) return null;

      const getConfidence = (dev) => {
        const absDev = Math.abs(dev);
        if (absDev >= 5) return { label: 'HIGH', color: 'text-profit' };
        if (absDev >= 2) return { label: 'MEDIUM', color: 'text-yellow-400' };
        return { label: 'LOW', color: 'text-muted-foreground' };
      };

      const deviations = frequency1000.map(f => ({ digit: f.digit, dev: f.percentage - 10 }));
      const sorted = [...deviations].sort((a, b) => Math.abs(b.dev) - Math.abs(a.dev));
      const topOver = sorted.filter(d => d.dev > 0)[0];
      const topUnder = sorted.filter(d => d.dev < 0)[0];

      let bestOverUnder = null;
      let maxOverUnderDev = 0;
      overUnder.forEach(row => {
        const expectedOver = (9 - row.digit) / 10 * 100;
        const expectedUnder = row.digit / 10 * 100;
        const overDev = row.overPercentage - expectedOver;
        const underDev = row.underPercentage - expectedUnder;
        if (Math.abs(overDev) > Math.abs(maxOverUnderDev)) {
          maxOverUnderDev = overDev;
          bestOverUnder = { type: 'OVER', digit: row.digit, dev: overDev, actual: row.overPercentage, expected: expectedOver };
        }
        if (Math.abs(underDev) > Math.abs(maxOverUnderDev)) {
          maxOverUnderDev = underDev;
          bestOverUnder = { type: 'UNDER', digit: row.digit, dev: underDev, actual: row.underPercentage, expected: expectedUnder };
        }
      });

      const evenDev = evenOdd.evenPercentage - 50;
      const oddDev = evenOdd.oddPercentage - 50;
      const evenOddBest = Math.abs(evenDev) >= Math.abs(oddDev) ? 
        { type: 'EVEN', dev: evenDev, actual: evenOdd.evenPercentage } : 
        { type: 'ODD', dev: oddDev, actual: evenOdd.oddPercentage };

      const riseDev = riseFall.risePercent - 50;
      const fallDev = riseFall.fallPercent - 50;
      const riseFallBest = Math.abs(riseDev) >= Math.abs(fallDev) ? 
        { type: 'RISE', dev: riseDev, actual: riseFall.risePercent } : 
        { type: 'FALL', dev: fallDev, actual: riseFall.fallPercent };

      return (
        <AnalysisCard title="📉 Trade Predictions" subtitle="Best contracts based on statistical deviation (last 1000 ticks)">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-secondary rounded-lg p-3">

                  <span className={`text-xs font-bold ${getConfidence(topOver.dev).color}`}>{getConfidence(topOver.dev).label}</span>
                </div>

              {topUnder && (
                <div className="flex justify-between items-center text-sm py-1">
                  <span className="font-mono">Digit {topUnder.digit} (under)</span>
                  <span className="font-mono text-loss">{topUnder.dev.toFixed(1)}%</span>
                  <span className={`text-xs font-bold ${getConfidence(topUnder.dev).color}`}>{getConfidence(topUnder.dev).label}</span>
                </div>
              )}
            </div>

            {bestOverUnder && (
              <div className="bg-secondary rounded-lg p-3">

                    {bestOverUnder.dev > 0 ? '+' : ''}{bestOverUnder.dev.toFixed(1)}%

                  <span className={`text-xs font-bold ${getConfidence(bestOverUnder.dev).color}`}>{getConfidence(bestOverUnder.dev).label}</span>

    function RangeDominanceScanner({ digits1000 }) {
      const N = 90;
      const len = digits1000.length;
      if (len === 0) return null;

      const counts = Array(10).fill(0);
      digits1000.forEach(d => counts[d]++);
      const windowSize = digits1000.length;

      const P = counts.map(c => c / windowSize);
      const P04 = P.slice(0, 5).reduce((a, b) => a + b, 0);
      const P59 = P.slice(5, 10).reduce((a, b) => a + b, 0);
      const E04 = P04 * N;
      const E59 = P59 * N;
      const D = Math.abs(P04 - 0.5);
      const threshold = 0.012;
      const hasSignal = D >= threshold;

      let message = '';
      if (hasSignal) {
        if (P04 > 0.5) {
          message = `🟢 0–4 dominance expected (${E04.toFixed(1)} vs ${E59.toFixed(1)} appearances) – Trade: Digit Under 7/6/5`;
        } else {
          message = `🟢 5–9 dominance expected (${E59.toFixed(1)} vs ${E04.toFixed(1)} appearances) – Trade: Digit Over 2/3/4`;

              <span className="font-mono">{E59.toFixed(1)} ticks</span>
            </div>

            <div className={`mt-3 p-3 rounded-lg border-2 text-center ${hasSignal ? (P04 > 0.5 ? 'border-profit bg-profit/10' : 'border-accent bg-accent/10') : 'border-border bg-secondary/50'}`}>
              {hasSignal ? <span className="font-bold">{message}</span> : <span className="text-muted-foreground">🔴 NO SIGNAL – market too balanced (D &lt; 1.2%)</span>}
            </div>
            <div className="text-xs text-muted-foreground border-t border-border pt-2">
              Based on last {windowSize} ticks | N=90 ticks (≈30s) | threshold 1.2%
            </div>
          </div>
        </AnalysisCard>
      );
    }

    function AIPrediction({ digits }) {
      const [lastDigit, setLastDigit] = useState(null);
      useEffect(() => {
        if (digits.length > 0) setLastDigit(digits[digits.length - 1]);
      }, [digits]);

      const prediction = useMemo(() => {
        const len = digits.length;
        if (len < 100) return null;

        const getCounts = (windowSize) => {
          const start = Math.max(0, len - windowSize);
          const slice = digits.slice(start, len);
          const counts = Array(10).fill(0);
          slice.forEach(d => counts[d]++);
          return counts;
        };

        const counts100 = getCounts(100);
        const counts500 = getCounts(500);
        const counts1000 = getCounts(1000);
        const total100 = Math.min(100, len);
        const total500 = Math.min(500, len);
        const total1000 = Math.min(1000, len);

        const weighted = Array(10).fill(0);
        for (let i = 0; i < 10; i++) {
          weighted[i] = 0.5 * (counts100[i] / total100) + 0.3 * (counts500[i] / total500) + 0.2 * (counts1000[i] / total1000);
        }

        const p = counts1000.map(c => c / total1000);
        let entropy = 0;
        for (let i = 0; i < 10; i++) {
          if (p[i] > 0) entropy -= p[i] * Math.log(p[i]);
        }
        const entropyOk = entropy < 2.25;

        const transition = Array(10).fill(null).map(() => Array(10).fill(0));
        const transCounts = Array(10).fill(null).map(() => Array(10).fill(0));
        const startIdx = Math.max(0, len - 1000);
        for (let i = startIdx; i < len - 1; i++) {
          const from = digits[i];
          const to = digits[i + 1];
          transCounts[from][to]++;
        }
        for (let from = 0; from < 10; from++) {
          const totalFrom = transCounts[from].reduce((a, b) => a + b, 0);
          if (totalFrom > 0) {
            for (let to = 0; to < 10; to++) {
              transition[from][to] = transCounts[from][to] / totalFrom;
            }
          }
        }

        const finalScore = Array(10).fill(0);
        if (lastDigit !== null) {
          const trans = transition[lastDigit];
          for (let j = 0; j < 10; j++) {
            finalScore[j] = weighted[j] * (trans[j] || 0);
          }
        } else {
          for (let j = 0; j < 10; j++) {
            finalScore[j] = weighted[j];
          }
        }

        const maxScore = Math.max(...finalScore);
        const meanScore = finalScore.reduce((a, b) => a + b, 0) / 10;
        const confidence = maxScore - meanScore;
        const confidenceOk = confidence >= 0.04;

        let tradeType = 'WAIT';
        if (entropyOk && confidenceOk) {
          for (let i = 0; i < 10; i++) {
            if (weighted[i] > 0.18) {
              tradeType = `Match Digit ${i}`;
              break;
            }
          }
          if (tradeType === 'WAIT') {
            const evenSum = weighted[0] + weighted[2] + weighted[4] + weighted[6] + weighted[8];
            if (evenSum > 0.55) {
              tradeType = 'Even';
            } else {
              const oddSum = weighted[1] + weighted[3] + weighted[5] + weighted[7] + weighted[9];
              if (oddSum > 0.55) {
                tradeType = 'Odd';
              } else {
                const maxDigit = finalScore.indexOf(maxScore);
                tradeType = maxDigit <= 4 ? 'Digit Under 5' : 'Digit Over 4';
              }
            }
          }
        }

        return { weighted, entropy: entropy.toFixed(3), entropyOk, confidence: confidence.toFixed(4), confidenceOk, tradeType };
      }, [digits, lastDigit]);

      if (!prediction) {
        return <AnalysisCard title="🧠 AI-Enhanced Digit Prediction" subtitle="Waiting for enough data (≥100 ticks)"><div className="text-center text-muted-foreground py-4">Collecting data...</div></AnalysisCard>;
      }

      return (
        <AnalysisCard title="🧠 AI-Enhanced Digit Prediction" subtitle="Multi‑window + entropy + transitions + confidence gate">
          <div className="space-y-3">
            <div className="grid grid-cols-2 gap-2 text-sm">
              <div><span className="text-muted-foreground">Entropy: </span><span className={prediction.entropyOk ? 'text-profit' : 'text-loss'}>{prediction.entropy} {prediction.entropyOk ? '✓' : '✗'}</span></div>
              <div><span className="text-muted-foreground">Confidence: </span><span className={prediction.confidenceOk ? 'text-profit' : 'text-loss'}>{prediction.confidence} {prediction.confidenceOk ? '✓' : '✗'}</span></div>
            </div>
            <div className="text-center text-lg font-bold">{prediction.tradeType === 'WAIT' ? <span className="text-yellow-400">⏳ WAIT</span> : <span className="text-profit">✅ {prediction.tradeType}</span>}</div>
            <div className="text-xs text-muted-foreground">Weighted scores: {prediction.weighted.map((w, i) => `${i}:${(w*100).toFixed(1)}%`).join('  ')}</div>
          </div>
        </AnalysisCard>
      );
    }

      }, [theme]);

      useDerivStream(

      }, [digits]);

      const currentDigit = digits.length > 0 ? digits[digits.length - 1] : null;
      const currentStreak = useMemo(() => {

      }, [digits]);
      const getStreakColor = (streak) => {

      };
      const upperDigits = frequencyAll.filter(f => f.digit <= 4);
      const lowerDigits = frequencyAll.filter(f => f.digit >= 5);

      return (
        <div className="min-h-screen bg-background">
          <header className="border-b border-border px-6 py-4">
            <div className="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-3">
              <div>
                <h1 className="text-xl font-bold text-foreground tracking-tight"><span className="text-primary">●</span> Trading Analysis</h1>
                <p className="text-xs text-muted-foreground mt-0.5">Deriv Synthetic Indices — Live Digit Analysis</p>
              </div>
              <div className="flex items-center gap-3 text-xs font-mono">
                <span className="flex items-center gap-1.5 text-profit"><span className="animate-pulse-glow">●</span> LIVE</span>
                <span className="text-muted-foreground">{digits.length.toLocaleString()} ticks</span>
                {lastPrice && <span className="text-highlight font-semibold">{lastPrice}</span>}
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-6 space-y-6">
            <div className="bg-card border border-border rounded-lg p-4 flex flex-wrap items-center gap-4">
              <div className="flex items-center gap-2">
                <label className="text-sm text-muted-foreground">Symbol:</label>
                <select value={symbol} onChange={e => setSymbol(e.target.value)} className="bg-secondary border border-border rounded px-3 py-1.5 text-sm font-mono text-foreground focus:outline-none focus:ring-1 focus:ring-primary">
                  {VOLATILITY_SYMBOLS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                </select>
              </div>
              <div className="flex items-center gap-2">
                <label className="text-sm text-muted-foreground">Max ticks:</label>
                <input type="number" value={maxTicks} disabled className="bg-secondary border border-border rounded px-3 py-1.5 text-sm font-mono text-foreground w-24 opacity-50 cursor-not-allowed" />
              </div>
              <div className="flex items-center gap-2">
                <label className="text-sm text-muted-foreground">Theme:</label>
                <select value={theme} onChange={e => setTheme(e.target.value)} className="bg-secondary border border-border rounded px-3 py-1.5 text-sm font-mono text-foreground focus:outline-none focus:ring-1 focus:ring-primary">
                  <option value="dark">Dark</option>
                  <option value="light">Light</option>
                  <option value="system">System</option>
                </select>
              </div>
            </div>

            {digits.length === 0 && (
              <div className="bg-card border border-border rounded-lg p-12 text-center">
                <p className="text-muted-foreground text-lg mb-2">Connecting to Deriv...</p>
                <p className="text-muted-foreground text-sm">Fetching historical ticks</p>
              </div>
            )}

            {digits.length > 0 && (
              <>
                <RangeDominanceScanner digits1000={digits1000} />
                <AIPrediction digits={digits} />
                <SuggestionCard frequency={frequency1000} />
                <SignalScanner digits1000={digits1000} lastDigit={currentDigit} />
                <div className="text-6xl md:text-7xl font-bold text-center py-4 border border-profit/30 rounded-lg bg-profit/5">
                  <span className={getStreakColor(currentStreak)}>{lastPrice ? getLastDigitFromPrice(lastPrice) : '--'}</span>
                </div>
                <div className="text-xs text-muted-foreground text-center mt-1">Last Digit {currentStreak > 1 ? `(streak: ${currentStreak})` : ''}</div>
                <RiseFallCard data={riseFall} />
                <RecentMovements prices={prices} />
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  <AnalysisCard title="Over / Under" subtitle={`Probability per digit barrier — Current price: ${lastPrice ? lastPrice : '--'}`}>
                    <OverUnderTable data={overUnder} />
                  </AnalysisCard>
                  <AnalysisCard title="Matches / Differs" subtitle={`Match & differ probability per digit — Current price: ${lastPrice ? lastPrice : '--'}`}>
                    <MatchDifferTable data={matchDiffer} />
                  </AnalysisCard>
                  <AnalysisCard title="Even / Odd" subtitle={`Even vs odd distribution — Current price: ${lastPrice ? lastPrice : '--'}`}>
                    <EvenOddDisplay data={evenOdd} />
                  </AnalysisCard>
                </div>
                <EvenOddSignalScanner digits1000={digits1000} threshold={threshold} setThreshold={setThreshold} minCount={minCount} setMinCount={setMinCount} />
                <AnalysisCard title="Digit Frequency" subtitle={`${selectedLabel} — ${totalTicks} ticks (expected 10.0% each)`}>
                  <div className="flex flex-col items-center space-y-4">
                    <div className="flex justify-center flex-wrap gap-2">
                      {upperDigits.map(f => <DigitCircle key={f.digit} digit={f.digit} percentage={f.percentage} rank={getRank(f.digit)} isCurrent={currentDigit === f.digit} />)}
                    </div>
                    <div className="flex justify-center flex-wrap gap-2">
                      {lowerDigits.map(f => <DigitCircle key={f.digit} digit={f.digit} percentage={f.percentage} rank={getRank(f.digit)} isCurrent={currentDigit === f.digit} />)}
                    </div>
                  </div>
                </AnalysisCard>
                <AnalysisCard title="Recent Digits" subtitle="Last 50 ticks (newest first) — Yellow ring indicates consecutive same digit">
                  <div className="flex flex-wrap gap-1.5">
                    {recentDigits.map((d, i) => (
                      <span key={i} className={`w-8 h-8 flex items-center justify-center rounded text-xs font-mono font-bold ${d % 2 === 0 ? "bg-profit/15 text-profit" : "bg-loss/15 text-loss"} ${consecutiveFlags[i] ? "ring-2 ring-yellow-400 ring-inset" : ""}`}>
                        {d}
                      </span>
                    ))}
                  </div>
                </AnalysisCard>
                <TradePredictions frequency1000={frequency1000} overUnder={overUnder} evenOdd={evenOdd} riseFall={riseFall} />
              </>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Index />);
  </script>
</body>
</html>
