<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deriv Live Tick Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-black text-white">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

/* =========================
   ✅ DERIV CONNECTION FIXED
========================= */
const DERIV_WS_URL = "wss://ws.derivws.com/websockets/v3?app_id=1089";

function useDerivStream(symbol, onTick, onHistory) {
  const wsRef = useRef(null);
  const reconnectRef = useRef(null);

  useEffect(() => {
    if (!symbol) return;

    let ws;
    let pingInterval;

    const connect = () => {
      ws = new WebSocket(DERIV_WS_URL);
      wsRef.current = ws;

      ws.onopen = () => {
        console.log("✅ Connected");

        // keep alive
        pingInterval = setInterval(() => {
          ws.send(JSON.stringify({ ping: 1 }));
        }, 30000);

        // get history
        ws.send(JSON.stringify({
          ticks_history: symbol,
          adjust_start_time: 1,
          end: "latest",
          count: 100,
          style: "ticks"
        }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        console.log("RAW:", data);

        // history
        if (data.msg_type === "history") {
          const prices = data.history.prices;
          onHistory(prices);

          // subscribe live
          ws.send(JSON.stringify({
            ticks: symbol,
            subscribe: 1
          }));
        }

        // live ticks
        if (data.msg_type === "tick") {
          onTick(data.tick.quote);
        }

        if (data.error) {
          console.error("Error:", data.error);
        }
      };

      ws.onclose = () => {
        console.log("❌ Disconnected");

        clearInterval(pingInterval);

        reconnectRef.current = setTimeout(() => {
          console.log("🔄 Reconnecting...");
          connect();
        }, 2000);
      };

      ws.onerror = (err) => {
        console.error("WS Error:", err);
      };
    };

    connect();

    return () => {
      clearInterval(pingInterval);
      clearTimeout(reconnectRef.current);
      if (wsRef.current) wsRef.current.close();
    };
  }, [symbol]);
}

/* =========================
   UI APP
========================= */

function App() {
  const [symbol, setSymbol] = useState("R_100");
  const [ticks, setTicks] = useState([]);
  const [lastPrice, setLastPrice] = useState(null);

  useDerivStream(
    symbol,
    (price) => {
      setLastPrice(price);
      setTicks(prev => [...prev, price].slice(-50));
    },
    (history) => {
      setTicks(history.slice(-50));
      setLastPrice(history[history.length - 1]);
    }
  );

  return (
    <div className="p-6 max-w-2xl mx-auto">

      <h1 className="text-2xl font-bold mb-4">
        🔴 Deriv Live Tick Stream
      </h1>

      <div className="mb-4">
        <select
          value={symbol}
          onChange={(e) => setSymbol(e.target.value)}
          className="bg-gray-800 p-2 rounded"
        >
          <option value="R_100">Volatility 100</option>
          <option value="R_50">Volatility 50</option>
          <option value="R_25">Volatility 25</option>
        </select>
      </div>

      <div className="text-4xl font-bold mb-6 text-green-400">
        {lastPrice ? lastPrice : "Connecting..."}
      </div>

      <div className="bg-gray-900 p-4 rounded h-64 overflow-y-auto">
        {ticks.map((t, i) => (
          <div key={i} className="text-sm border-b border-gray-700 py-1">
            {t}
          </div>
        ))}
      </div>

    </div>
  );
}

/* ========================= */

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
