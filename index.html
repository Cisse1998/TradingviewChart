<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digits Analyzer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background:#0f0f0f; color:#fff; font-family: monospace; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

/* ===================== FIXED DERIV CONNECTION ===================== */

const DERIV_WS_URL = "wss://ws.derivws.com/websockets/v3?app_id=1089";

function useDerivStream(symbol, onTick, onHistory) {
  const wsRef = useRef(null);
  const reconnectRef = useRef(null);
  const subscriptionIdRef = useRef(null);

  useEffect(() => {
    if (!symbol) return;

    let isMounted = true;

    const connect = () => {
      const ws = new WebSocket(DERIV_WS_URL);
      wsRef.current = ws;

      ws.onopen = () => {
        console.log("✅ Connected");

        ws.send(JSON.stringify({
          ticks_history: symbol,
          count: 1000,
          end: "latest",
          style: "ticks"
        }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        // HISTORY
        if (data.msg_type === "history") {
          const prices = data.history.prices || [];
          const times = data.history.times || [];

          const ticks = prices.map((p, i) => ({
            price: parseFloat(p),
            time: times[i]
          }));

          onHistory(ticks);

          ws.send(JSON.stringify({
            ticks: symbol,
            subscribe: 1
          }));
        }

        // LIVE TICKS
        if (data.msg_type === "tick") {
          subscriptionIdRef.current = data.subscription?.id;

          onTick(
            data.tick.quote,
            data.tick.epoch
          );
        }
      };

      ws.onclose = () => {
        console.log("🔌 Reconnecting...");
        if (isMounted) {
          reconnectRef.current = setTimeout(connect, 2000);
        }
      };

      ws.onerror = (e) => console.error(e);
    };

    connect();

    return () => {
      isMounted = false;

      if (reconnectRef.current) clearTimeout(reconnectRef.current);

      if (wsRef.current) {
        if (subscriptionIdRef.current) {
          wsRef.current.send(JSON.stringify({
            forget: subscriptionIdRef.current
          }));
        }
        wsRef.current.close();
      }
    };
  }, [symbol]);
}

/* ===================== APP ===================== */

function App() {
  const [symbol, setSymbol] = useState("R_100");
  const [digits, setDigits] = useState([]);
  const [price, setPrice] = useState(null);

  const getLastDigit = (price) => {
    const str = price.toString();
    return parseInt(str[str.length - 1]);
  };

  useDerivStream(
    symbol,
    (price) => {
      const digit = getLastDigit(price);

      setPrice(price);

      setDigits(prev => {
        const next = [...prev, digit];
        return next.slice(-1000);
      });
    },
    (history) => {
      const d = history.map(t => getLastDigit(t.price));
      setDigits(d);
    }
  );

  return (
    <div style={{padding:20}}>
      <h1>📊 Deriv Live Digits</h1>

      <select value={symbol} onChange={e=>setSymbol(e.target.value)}>
        <option value="R_100">Volatility 100</option>
        <option value="R_50">Volatility 50</option>
        <option value="R_25">Volatility 25</option>
      </select>

      <h2 style={{marginTop:20}}>
        Last Price: {price}
      </h2>

      <h1 style={{fontSize:60}}>
        {price ? getLastDigit(price) : "--"}
      </h1>

      <p>Ticks: {digits.length}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
